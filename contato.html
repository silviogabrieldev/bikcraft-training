<!doctype html>

<html>
    <head>
        <meta charset="utf-8" />
        <title>Bikcraft</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <section>
            <div class="address-box"></div>
            <form>
              <!-- Primeira caixa -->
              <div class="primary-box">
                  <div>
                      <label>Nome</label>
                      <input type="text" placeholder="Seu nome" />
                  </div>
                  <div>
                      <label>Telefone</label>
                      <input type="tel" placeholder="(XX) XXXXX-XXXX" />
                  </div>
              </div>
      
              <!-- Segunda caixa -->
              <div class="secondary-box">
                  <label>Email</label>
                  <input type="email" placeholder="contato@email.com" />
              </div>
      
              <!-- Terceira caixa -->
              <div  class="third-box">
                  <label>Mensagem</label>
                  <textarea placeholder="O que você precisa?"></textarea>
              </div>
      
              <!-- Botão -->
              <button>enviar mensagem</button>
            </form>
        </section>
    </body>
</html>
